<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8 Lincoln 30</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #33ff33;
      font-family: "Courier New", Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .terminal {
      width: 100%;
      max-width: 820px;
      border: 2px solid #33ff33;
      padding: 24px;
      box-sizing: border-box;
      box-shadow: 0 0 12px rgba(51, 255, 51, 0.25);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 10px 0;
      font-size: 3rem;
      letter-spacing: 2px;
    }

    .header p {
      margin: 6px 0;
      font-size: 1.1rem;
    }

    .line {
      border-top: 1px solid #33ff33;
      margin: 18px 0;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .log {
      line-height: 1.8;
      font-size: 1rem;
      white-space: pre-wrap;
      min-height: 10em;
    }

    .log-line {
      opacity: 0;
      transition: opacity 0.2s ease-in;
    }

    .log-line.visible {
      opacity: 1;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.95rem;
    }

    a {
      color: #33ff33;
    }

    .blink {
      animation: blink 1.1s steps(2, start) infinite;
    }

    .cursor {
      display: inline-block;
      margin-left: 6px;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      to {
        visibility: hidden;
      }
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 2.1rem;
      }

      .terminal {
        padding: 18px;
      }

      .log {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="header">
      <h1>8LINCOLN30.COM</h1>
      <p>LAPD DISPATCH TERMINAL</p>
      <p>UNIT: 8 LINCOLN 30</p>
      <p>STATUS: IN SERVICE <span class="blink">■</span></p>
    </div>

    <div class="line"></div>

    <div class="section-title">Current Message</div>
    <div class="log">WORK IN PROGRESS
Welcome to the party, pal!</div>

    <div class="line"></div>

    <div class="section-title">Dispatch Log</div>
    <div class="log" id="dispatch-log" aria-live="polite"></div>

    <div class="line"></div>

    <div class="footer">
      Tribute site / future consulting outpost.<br />
      More to come.
    </div>
  </div>

  <script>
    const logEntries = [
      { time: "22:42", text: "Unit 8 Lincoln 30 reports possible disturbance at Nakatomi Plaza" },
      { time: "22:45", text: "Contact established with unknown party inside building" },
      { time: "22:47", text: "Situation appears larger than initially reported" },
      { time: "22:49", text: "Officer on scene requests additional response" },
      { time: "22:52", text: "Stand by for further updates..." }
    ];

    const totalAnimationMs = 5000; // whole sequence finishes in 5 seconds
    const logEl = document.getElementById("dispatch-log");

    function toMinutes(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    }

    function renderLine(entry) {
      const line = document.createElement("div");
      line.className = "log-line";
      line.textContent = `${entry.time}  ${entry.text}`;
      logEl.appendChild(line);

      requestAnimationFrame(() => {
        line.classList.add("visible");
      });
    }

    function showCursor() {
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "■";
      cursor.id = "dispatch-cursor";
      logEl.appendChild(cursor);
    }

    function removeCursor() {
      const cursor = document.getElementById("dispatch-cursor");
      if (cursor) cursor.remove();
    }

    function animateDispatch(entries) {
      if (!entries.length) return;

      const times = entries.map(e => toMinutes(e.time));
      const first = times[0];
      const last = times[times.length - 1];
      const span = Math.max(last - first, 1);

      logEl.innerHTML = "";
      showCursor();

      entries.forEach((entry, index) => {
        const relativeOffset = (times[index] - first) / span;
        const delay = Math.round(relativeOffset * totalAnimationMs);

        setTimeout(() => {
          removeCursor();
          renderLine(entry);
          logEl.appendChild(document.createTextNode("\n"));
          if (index < entries.length - 1) {
            showCursor();
          }
        }, delay);
      });

      setTimeout(() => {
        removeCursor();
      }, totalAnimationMs + 300);
    }

    animateDispatch(logEntries);
  </script>
</body>
</html>
