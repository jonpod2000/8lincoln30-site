<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8 Lincoln 30 - Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #f5f5f5;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
    }

    #radio-intro {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #000;
    }

    #static {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 1px,
          transparent 3px
        );
      animation: flicker 0.12s infinite;
    }

    #dispatch-text {
      position: relative;
      z-index: 2;
      max-width: 900px;
      padding: 24px;
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.35;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 0.45s ease, transform 0.45s ease;
      text-shadow: 0 0 8px rgba(255,255,255,0.18);
    }

    #dispatch-text.show {
      opacity: 1;
      transform: scale(1);
    }

    #corner-tag {
      position: absolute;
      bottom: 18px;
      right: 22px;
      z-index: 2;
      font-size: 12px;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }

    @keyframes flicker {
      0% { opacity: 0.10; }
      20% { opacity: 0.16; }
      50% { opacity: 0.23; }
      80% { opacity: 0.14; }
      100% { opacity: 0.12; }
    }
  </style>
</head>
<body>
  <div id="radio-intro">
    <div id="static"></div>
    <div id="dispatch-text">Dispatch: 8 Lincoln 30...</div>
    <div id="corner-tag">monitor channel</div>
  </div>

  <script>
    window.addEventListener("load", () => {
      const text = document.getElementById("dispatch-text");

      setTimeout(() => {
        text.classList.add("show");
      }, 400);

      setTimeout(() => {
        text.textContent = "Dispatch: shots fired. I repeat, shots fired.";
      }, 2200);

      setTimeout(() => {
        text.textContent = "8 Lincoln 30";
      }, 4300);
    });
  </script>
</body>
</html>
