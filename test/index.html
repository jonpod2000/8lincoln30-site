<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8 Lincoln 30 - Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #radio-intro {
      position: relative;
      width: 100%;
      height: 100vh;
      background:
        radial-gradient(circle at center, rgba(40, 255, 140, 0.08) 0%, rgba(0, 0, 0, 0) 55%),
        #000;
      overflow: hidden;
    }

    /* Soft CRT glow */
    #radio-intro::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(40, 255, 140, 0.08), rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* Scanlines */
    #scanlines {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 2px,
          rgba(40, 255, 140, 0.06) 3px,
          rgba(0, 0, 0, 0) 4px
        );
      opacity: 0.35;
      pointer-events: none;
      z-index: 2;
    }

    /* Flicker/noise layer */
    #noise {
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.10) 0px,
          rgba(255,255,255,0.02) 1px,
          transparent 2px,
          transparent 4px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.03) 0px,
          transparent 2px,
          rgba(255,255,255,0.02) 3px,
          transparent 5px
        );
      mix-blend-mode: screen;
      animation: flicker 0.16s infinite steps(2);
      pointer-events: none;
      z-index: 3;
    }

    /* Slow sweep line */
    #sweep {
      position: absolute;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(
        to bottom,
        rgba(40,255,140,0),
        rgba(40,255,140,0.06),
        rgba(40,255,140,0)
      );
      animation: sweep 6s linear infinite;
      pointer-events: none;
      z-index: 4;
    }

    #content {
      position: relative;
      z-index: 5;
      width: min(980px, 90vw);
      margin: 0 auto;
      text-align: center;
      color: #7CFFB2;
      text-shadow:
        0 0 4px rgba(124,255,178,0.7),
        0 0 10px rgba(124,255,178,0.25);
      padding: 40px 24px;
    }

    #dispatch-label {
      font-size: 14px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 28px;
    }

    #dispatch-text {
      font-size: clamp(24px, 3.2vw, 44px);
      line-height: 1.4;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      min-height: 3.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #dispatch-text.show {
      opacity: 1;
      transform: scale(1);
    }

    #footer-tag {
      position: absolute;
      bottom: 18px;
      right: 24px;
      z-index: 5;
      color: rgba(124,255,178,0.55);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 6px rgba(124,255,178,0.25);
    }

    @keyframes flicker {
      0% { opacity: 0.09; }
      25% { opacity: 0.14; }
      50% { opacity: 0.08; }
      75% { opacity: 0.16; }
      100% { opacity: 0.11; }
    }

    @keyframes sweep {
      0% { top: -90px; }
      100% { top: 100%; }
    }
  </style>
</head>
<body>
  <div id="radio-intro">
    <div id="scanlines"></div>
    <div id="noise"></div>
    <div id="sweep"></div>

    <div id="content">
      <div id="dispatch-label">LAPD DISPATCH CHANNEL</div>
      <div id="dispatch-text">Dispatch: Unit 2-5-4, check out Nakatomi Plaza.</div>
    </div>

    <div id="footer-tag">8 Lincoln 30</div>
  </div>

  <script>
    window.addEventListener("load", () => {
      const text = document.getElementById("dispatch-text");

      setTimeout(() => {
        text.classList.add("show");
      }, 300);

      setTimeout(() => {
        text.textContent = "Powell: Dispatch, this is 2-5-4. I'm outside Nakatomi Plaza. Everything looks normal.";
      }, 2600);

      setTimeout(() => {
        text.textContent = "Powell: Shots fired! I repeat, shots fired!";
      }, 6200);

      setTimeout(() => {
        text.textContent = "8 Lincoln 30";
      }, 9200);
    });
  </script>
</body>
</html>
  </script>
</body>
</html>
