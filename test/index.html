<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8 Lincoln 30 - Test</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #f5f5f5;
      font-family: "Courier New", monospace;
    }

    #radio-intro {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #static {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 1px,
          transparent 3px
        );
      opacity: 0.18;
      animation: flicker 0.12s infinite;
      pointer-events: none;
    }

    #dispatch-text {
      position: relative;
      z-index: 2;
      font-size: clamp(20px, 3vw, 36px);
      padding: 24px;
      max-width: 900px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #dispatch-text.show {
      opacity: 1;
    }

    @keyframes flicker {
      0% { opacity: 0.12; }
      50% { opacity: 0.22; }
      100% { opacity: 0.14; }
    }
  </style>
</head>
<body>
  <div id="radio-intro">
    <div id="static"></div>
    <div id="dispatch-text">DISPATCH: 8 LINCOLN 30...</div>
  </div>

  <script>
    window.addEventListener("load", () => {
      const text = document.getElementById("dispatch-text");

      setTimeout(() => {
        text.classList.add("show");
      }, 500);

      setTimeout(() => {
        text.textContent = "DISPATCH: REPORT OF SHOTS FIRED.";
      }, 2200);

      setTimeout(() => {
        text.textContent = "8 LINCOLN 30";
      }, 4200);
    });
  </script>
</body>
</html>
